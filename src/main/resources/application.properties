# =============================================================================
# ESMind — Application Configuration
# Edit this file to configure the LLM model and Elasticsearch connection.
# Environment variables override these values at runtime.
# Copy from .env.example for a quick start template.
# =============================================================================

# ---------------------------------------------------------------------------
# LLM Model Configuration (DashScope / OpenAI compatible)
# ---------------------------------------------------------------------------
# API base URL (DashScope default)
esmind.model.base-url=https://api.deepseek.com
# API key — required, set your key here or via DASHSCOPE_API_KEY env var
esmind.model.api-key=sk-a7ffdc3d351e406eaf29249cc58b1676
# Model name (default: qwen-max)
esmind.model.name=deepseek-v4-pro

# Embedding model (optional, for workspace memory)
# esmind.model.embedding=text-embedding-v2

# ---------------------------------------------------------------------------
# Elasticsearch Connection
# ---------------------------------------------------------------------------
esmind.es.host=192.168.8.59
esmind.es.port=9230
esmind.es.scheme=http
# Basic auth (leave blank if not needed)
esmind.es.username=
esmind.es.password=

# ---------------------------------------------------------------------------
# Workspace
# ---------------------------------------------------------------------------
# Directory for agent workspace (AGENTS.md, knowledge, skills, memory)
esmind.workspace=.agentscope/workspace
