<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESMind — NL → Elasticsearch Agent</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* ═══════════════════════════════════════════
           Base & Reset
           ═══════════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #1a1d27;
            --bg-card: #222639;
            --bg-hover: #2a2e42;
            --border: #2e3348;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0b0;
            --text-muted: #5c6370;
            --accent: #4f8ef7;
            --accent-hover: #6ba3ff;
            --accent-glow: rgba(79, 142, 247, 0.15);
            --user-bg: #1e3a5f;
            --user-border: #2a5a8f;
            --code-bg: #14171e;
            --success: #34d399;
            --radius: 10px;
            --radius-sm: 6px;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
            --font-mono: "SF Mono", "Fira Code", "Consolas", monospace;
        }

        html, body {
            height: 100%;
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 960px;
            margin: 0 auto;
            padding: 0 16px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .header-logo {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, var(--accent), #7c5cfc);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700; font-size: 14px; color: white;
            flex-shrink: 0;
        }

        .header-text h1 { font-size: 16px; font-weight: 600; }
        .header-text p { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }

        .header-status {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px; color: var(--text-muted);
        }
        .status-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--success); animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Messages */
        .messages {
            flex: 1; overflow-y: auto; padding: 16px 0; scroll-behavior: smooth;
        }
        .messages::-webkit-scrollbar { width: 6px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .messages:empty::after {
            content: "输入自然语言查询 Elasticsearch 数据";
            display: flex; align-items: center; justify-content: center;
            height: 100%; color: var(--text-muted); font-size: 14px; opacity: 0.5;
        }

        .message { margin-bottom: 20px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .message-header {
            display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
        }
        .message-avatar {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 600; flex-shrink: 0;
        }
        .message-avatar.user { background: var(--accent); color: white; }
        .message-avatar.agent { background: linear-gradient(135deg, #7c5cfc, #4f8ef7); color: white; }
        .message-name { font-size: 12px; font-weight: 600; }
        .message-time { font-size: 11px; color: var(--text-muted); margin-left: auto; }

        .message-content { padding: 12px 16px; border-radius: var(--radius); line-height: 1.6; font-size: 14px; overflow-x: auto; }
        .message-content.user {
            background: var(--user-bg); border: 1px solid var(--user-border);
            max-width: 80%; margin-left: auto; border-top-right-radius: 4px;
        }
        .message-content.agent { background: var(--bg-card); border: 1px solid var(--border); border-top-left-radius: 4px; }

        /* Detail panels inside agent messages */
        .detail-panel {
            margin: 10px 0;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .detail-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 12px; background: var(--bg-secondary);
            cursor: pointer; user-select: none;
            font-size: 12px; font-weight: 600;
            transition: background 0.15s;
        }
        .detail-header:hover { background: var(--bg-hover); }
        .detail-header .icon { margin-right: 6px; font-size: 14px; }
        .detail-header .chevron { color: var(--text-muted); transition: transform 0.2s; font-size: 10px; }
        .detail-header.collapsed .chevron { transform: rotate(-90deg); }

        .detail-body {
            padding: 0; max-height: 400px; overflow: auto;
            transition: max-height 0.25s ease;
        }
        .detail-body.collapsed { max-height: 0; overflow: hidden; }

        .detail-body pre {
            margin: 0; padding: 12px;
            font-family: var(--font-mono); font-size: 12px; line-height: 1.5;
            background: var(--code-bg); color: var(--text-primary);
            white-space: pre; overflow-x: auto;
        }

        .detail-panel.dsl .detail-header { border-bottom: 1px solid var(--border); color: var(--accent); }
        .detail-panel.es .detail-header { border-bottom: 1px solid var(--border); color: var(--success); }
        .detail-panel.es pre { max-height: 300px; }

        .detail-body .copy-btn {
            position: sticky; top: 4px; float: right; margin: 4px;
            background: var(--bg-hover); border: 1px solid var(--border);
            color: var(--text-secondary); padding: 3px 10px;
            border-radius: 4px; cursor: pointer; font-size: 11px;
            transition: all 0.15s; z-index: 1;
        }
        .detail-body .copy-btn:hover { background: var(--bg-card); color: var(--text-primary); }

        /* AI explanation section (inside agent message) */
        .agent-text {
            line-height: 1.65;
        }
        .agent-text h1,.agent-text h2,.agent-text h3 { margin: 14px 0 7px; color: var(--accent); }
        .agent-text h1 { font-size: 17px; }
        .agent-text h2 { font-size: 15px; }
        .agent-text h3 { font-size: 13px; }
        .agent-text p { margin: 5px 0; }
        .agent-text ul,.agent-text ol { margin: 5px 0; padding-left: 20px; }
        .agent-text li { margin: 2px 0; }
        .agent-text strong { color: var(--text-primary); }
        .agent-text em { color: var(--text-secondary); }
        .agent-text code {
            font-family: var(--font-mono); font-size: 12.5px;
            background: var(--code-bg); padding: 1px 5px;
            border-radius: 3px; color: #fbbf24;
        }
        .agent-text pre {
            margin: 8px 0; background: var(--code-bg);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            padding: 10px 12px; overflow-x: auto;
            font-size: 12px;
        }
        .agent-text blockquote {
            border-left: 3px solid var(--accent); padding-left: 10px;
            margin: 6px 0; color: var(--text-secondary);
        }
        .agent-text table {
            width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12.5px;
        }
        .agent-text th,.agent-text td {
            padding: 6px 10px; text-align: left; border: 1px solid var(--border);
        }
        .agent-text th { background: var(--bg-secondary); color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; }
        .agent-text td { background: var(--bg-primary); }
        .agent-text tr:nth-child(even) td { background: var(--bg-secondary); }
        .agent-text hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
        .agent-text .code-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 5px 12px; background: var(--bg-secondary);
            border: 1px solid var(--border); border-bottom: none;
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
            font-size: 10px; color: var(--text-muted);
        }
        .agent-text .code-header + pre { margin-top: 0; border-top-left-radius: 0; border-top-right-radius: 0; }
        .agent-text .copy-btn {
            background: none; border: 1px solid var(--border);
            color: var(--text-secondary); padding: 2px 7px;
            border-radius: 3px; cursor: pointer; font-size: 10px;
            transition: all 0.15s;
        }
        .agent-text .copy-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

        /* Loading */
        .loading {
            display: none; align-items: center; gap: 10px;
            padding: 12px 16px; margin-bottom: 20px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); border-top-left-radius: 4px;
            animation: fadeIn 0.3s ease;
        }
        .loading.active { display: flex; }

        .spinner {
            width: 16px; height: 16px;
            border: 2px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { font-size: 12px; color: var(--text-secondary); }

        /* Input */
        .input-area { flex-shrink: 0; padding: 14px 0 18px; border-top: 1px solid var(--border); }
        .input-wrapper {
            display: flex; gap: 8px; background: var(--bg-secondary);
            border: 1px solid var(--border); border-radius: var(--radius);
            padding: 4px; transition: border-color 0.2s;
        }
        .input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

        .input-wrapper textarea {
            flex: 1; background: none; border: none; outline: none;
            color: var(--text-primary); font-family: var(--font);
            font-size: 14px; padding: 9px 12px; resize: none;
            min-height: 22px; max-height: 120px; line-height: 1.5;
        }
        .input-wrapper textarea::placeholder { color: var(--text-muted); }

        .send-btn {
            display: flex; align-items: center; justify-content: center;
            width: 40px; height: 40px; border: none;
            border-radius: var(--radius-sm); background: var(--accent);
            color: white; cursor: pointer; transition: all 0.2s;
            flex-shrink: 0; align-self: flex-end; font-size: 16px;
        }
        .send-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .input-footer {
            display: flex; justify-content: space-between; margin-top: 5px;
            padding: 0 4px; font-size: 11px; color: var(--text-muted);
        }
        .input-footer kbd {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 3px; padding: 1px 4px; font-size: 10px;
        }
        .clear-btn {
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; font-size: 11px; transition: color 0.15s;
        }
        .clear-btn:hover { color: var(--text-primary); }

        @media (max-width: 600px) {
            .app { padding: 0 12px; }
            .message-content.user { max-width: 90%; }
        }
    </style>
</head>
<body>

<div class="app" id="app">
    <header class="header">
        <div class="header-logo">ES</div>
        <div class="header-text">
            <h1>ESMind</h1>
            <p>自然语言 → Elasticsearch 查询 Agent</p>
        </div>
        <div class="header-status">
            <span class="status-dot"></span>
            <span id="status-label">就绪</span>
        </div>
    </header>

    <div class="messages" id="messages"></div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <span class="loading-text">Agent 正在思考<span class="dots"></span></span>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="input"
                      placeholder="例：找出诊断中含有'心肌梗死'的患者..."
                      rows="1" maxlength="2000"
                      oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="发送 (Enter)">▶</button>
        </div>
        <div class="input-footer">
            <span><kbd>Enter</kbd> 发送 · <kbd>Shift</kbd>+<kbd>Enter</kbd> 换行</span>
            <button class="clear-btn" onclick="clearMessages()">清空对话</button>
        </div>
    </div>
</div>

<script>
    marked.setOptions({ breaks: true, gfm: true });

    const renderer = new marked.Renderer();
    renderer.code = function({ text, lang }) {
        const langLabel = lang ? lang.toUpperCase() : 'JSON';
        const id = 'code-' + Math.random().toString(36).slice(2, 8);
        return '<div class="code-header">'
            + '<span>' + langLabel + '</span>'
            + '<button class="copy-btn" onclick="copyText(\'' + id + '\')">📋 复制</button>'
            + '</div>'
            + '<pre><code id="' + id + '">' + escapeHtml(text) + '</code></pre>';
    };
    marked.use({ renderer });

    function escapeHtml(text) {
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    function copyText(id) {
        const el = document.getElementById(id);
        if (!el) return;
        navigator.clipboard.writeText(el.textContent).then(() => {
            const btn = el.parentElement.previousElementSibling?.querySelector('.copy-btn');
            if (btn) { btn.textContent = '✅ 已复制'; setTimeout(() => { btn.textContent = '📋 复制'; }, 2000); }
        });
    }

    // ════════════════════════════════════════════════════
    // Chat logic
    // ════════════════════════════════════════════════════

    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const messages = document.getElementById('messages');
    const loading = document.getElementById('loading');
    const statusLabel = document.getElementById('status-label');
    let isProcessing = false;

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    async function sendMessage() {
        const question = input.value.trim();
        if (!question || isProcessing) return;

        isProcessing = true;
        sendBtn.disabled = true;
        input.disabled = true;

        addUserMessage(question);
        input.value = '';
        input.style.height = 'auto';

        loading.classList.add('active');
        statusLabel.textContent = '查询中...';
        scrollToBottom();

        try {
            const resp = await fetch('/api/chat/detail', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question })
            });
            const data = await resp.json();
            addAgentMessage(data);
        } catch (err) {
            addAgentMessage({ answer: '⚠️ 请求失败: ' + err.message, elapsed_ms: 0 });
        } finally {
            isProcessing = false;
            sendBtn.disabled = false;
            input.disabled = false;
            input.focus();
            loading.classList.remove('active');
            statusLabel.textContent = '就绪';
            scrollToBottom();
        }
    }

    function addUserMessage(text) {
        const t = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        const div = document.createElement('div');
        div.className = 'message';
        div.innerHTML = '<div class="message-header">'
            + '<div class="message-avatar user">U</div>'
            + '<span class="message-name">查询</span>'
            + '<span class="message-time">' + t + '</span></div>'
            + '<div class="message-content user">' + escapeHtml(text) + '</div>';
        messages.appendChild(div);
        scrollToBottom();
    }

    function addAgentMessage(data) {
        const t = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        const elapsed = data.elapsed_ms ? formatElapsed(data.elapsed_ms) : '';

        const body = document.createElement('div');
        body.className = 'message-content agent';

        // 1. AI explanation (always shown)
        const textDiv = document.createElement('div');
        textDiv.className = 'agent-text';
        textDiv.innerHTML = marked.parse(data.answer || '');
        body.appendChild(textDiv);

        // 2. DSL panel (if available)
        if (data.dsl) {
            body.appendChild(createDetailPanel('dsl', '🔍 查询 DSL', data.dsl));
        }

        // 3. ES result panel (if available)
        if (data.es_result) {
            body.appendChild(createDetailPanel('es', '📊 ES 原始结果', data.es_result));
        }

        const wrapper = document.createElement('div');
        wrapper.className = 'message';
        wrapper.innerHTML = '<div class="message-header">'
            + '<div class="message-avatar agent">AI</div>'
            + '<span class="message-name">ESMind</span>'
            + '<span class="message-time">' + elapsed + ' ' + t + '</span></div>';
        wrapper.appendChild(body);
        messages.appendChild(wrapper);
        scrollToBottom();
    }

    function createDetailPanel(type, title, content) {
        const id = 'panel-' + Math.random().toString(36).slice(2, 6);
        const contentId = id + '-content';

        const panel = document.createElement('div');
        panel.className = 'detail-panel ' + type;

        const header = document.createElement('div');
        header.className = 'detail-header collapsed';
        header.innerHTML = '<span><span class="icon">' + title.split(' ')[0] + '</span>'
            + title.split(' ').slice(1).join(' ')
            + '</span><span class="chevron">▼</span>';
        header.onclick = function() {
            const body = document.getElementById(contentId);
            const isCollapsed = body.classList.contains('collapsed');
            body.classList.toggle('collapsed');
            header.classList.toggle('collapsed');
        };
        panel.appendChild(header);

        const body = document.createElement('div');
        body.id = contentId;
        body.className = 'detail-body collapsed';

        // Copy button
        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.textContent = '📋 复制全文';
        copyBtn.onclick = function(e) {
            e.stopPropagation();
            const text = content;
            navigator.clipboard.writeText(text).then(() => {
                copyBtn.textContent = '✅ 已复制';
                setTimeout(() => { copyBtn.textContent = '📋 复制全文'; }, 2000);
            });
        };
        body.appendChild(copyBtn);

        const pre = document.createElement('pre');
        // Format if JSON
        try {
            pre.textContent = JSON.stringify(JSON.parse(content), null, 2);
        } catch(e) {
            pre.textContent = content;
        }
        body.appendChild(pre);

        panel.appendChild(body);
        return panel;
    }

    function formatElapsed(ms) {
        if (ms < 1000) return ms + 'ms';
        if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
        const m = Math.floor(ms / 60000);
        const s = Math.floor((ms % 60000) / 1000);
        return m + 'm ' + s + 's';
    }

    function scrollToBottom() {
        setTimeout(() => { messages.scrollTop = messages.scrollHeight; }, 50);
    }

    function clearMessages() {
        if (messages.children.length === 0) return;
        if (confirm('确定清空所有对话？')) {
            messages.innerHTML = '';
            loading.classList.remove('active');
            isProcessing = false;
            sendBtn.disabled = false;
            input.disabled = false;
        }
    }

    window.addEventListener('load', () => { input.focus(); });
</script>
</body>
</html>
