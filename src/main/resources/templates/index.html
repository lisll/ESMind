<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESMind — NL → Elasticsearch Agent</title>

    <!-- marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* ═══════════════════════════════════════════
           Base & Reset
           ═══════════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #1a1d27;
            --bg-card: #222639;
            --bg-hover: #2a2e42;
            --border: #2e3348;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0b0;
            --text-muted: #5c6370;
            --accent: #4f8ef7;
            --accent-hover: #6ba3ff;
            --accent-glow: rgba(79, 142, 247, 0.15);
            --user-bg: #1e3a5f;
            --user-border: #2a5a8f;
            --success: #34d399;
            --warning: #fbbf24;
            --error: #f87171;
            --code-bg: #1a1d27;
            --radius: 10px;
            --radius-sm: 6px;
            --shadow: 0 2px 12px rgba(0,0,0,0.3);
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
            --font-mono: "SF Mono", "Fira Code", "Consolas", monospace;
        }

        html, body {
            height: 100%;
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* ═══════════════════════════════════════════
           Layout
           ═══════════════════════════════════════════ */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 16px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .header-logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), #7c5cfc);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: white;
            flex-shrink: 0;
        }

        .header-text h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .header-text p {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 1px;
        }

        .header-status {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Chat Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }
        .messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .messages:empty::after {
            content: "输入自然语言查询 Elasticsearch 数据";
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            font-size: 15px;
            opacity: 0.6;
        }

        /* Message Bubbles */
        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .message-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .message-avatar.user {
            background: var(--accent);
            color: white;
        }

        .message-avatar.agent {
            background: linear-gradient(135deg, #7c5cfc, #4f8ef7);
            color: white;
        }

        .message-name {
            font-size: 13px;
            font-weight: 600;
        }

        .message-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: auto;
        }

        .message-content {
            padding: 14px 18px;
            border-radius: var(--radius);
            line-height: 1.65;
            font-size: 14px;
            overflow-x: auto;
        }

        .message-content.user {
            background: var(--user-bg);
            border: 1px solid var(--user-border);
            max-width: 80%;
            margin-left: auto;
            border-top-right-radius: 4px;
        }

        .message-content.agent {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-top-left-radius: 4px;
        }

        /* Markdown styling inside agent messages */
        .message-content.agent h1,
        .message-content.agent h2,
        .message-content.agent h3 {
            margin: 16px 0 8px;
            color: var(--accent);
        }
        .message-content.agent h1 { font-size: 18px; }
        .message-content.agent h2 { font-size: 16px; }
        .message-content.agent h3 { font-size: 14px; }

        .message-content.agent p {
            margin: 6px 0;
        }

        .message-content.agent ul,
        .message-content.agent ol {
            margin: 6px 0;
            padding-left: 22px;
        }
        .message-content.agent li {
            margin: 3px 0;
        }

        .message-content.agent strong {
            color: var(--text-primary);
        }

        .message-content.agent em {
            color: var(--text-secondary);
        }

        .message-content.agent code {
            font-family: var(--font-mono);
            font-size: 13px;
            background: var(--code-bg);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--warning);
        }

        .message-content.agent pre {
            margin: 10px 0;
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            overflow-x: auto;
            position: relative;
        }

        .message-content.agent pre code {
            background: none;
            padding: 0;
            color: var(--text-primary);
            font-size: 12.5px;
            line-height: 1.5;
            white-space: pre;
        }

        .message-content.agent blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 12px;
            margin: 8px 0;
            color: var(--text-secondary);
        }

        /* Tables in markdown */
        .message-content.agent table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 13px;
        }

        .message-content.agent th,
        .message-content.agent td {
            padding: 8px 12px;
            text-align: left;
            border: 1px solid var(--border);
        }

        .message-content.agent th {
            background: var(--bg-secondary);
            color: var(--accent);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .message-content.agent td {
            background: var(--bg-primary);
        }

        .message-content.agent tr:nth-child(even) td {
            background: var(--bg-secondary);
        }

        .message-content.agent hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 16px 0;
        }

        /* Copy button for code blocks */
        .code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 10px;
        }

        .code-header + pre {
            margin-top: 0;
            border-top-left-radius: 0;
            border-top-right-radius: 0;
        }

        .copy-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        /* Loading indicator */
        .loading {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 14px 18px;
            margin-bottom: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            border-top-left-radius: 4px;
            animation: fadeIn 0.3s ease;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .loading-text .dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
            100% { content: ''; }
        }

        /* Input Area */
        .input-area {
            flex-shrink: 0;
            padding: 16px 0 20px;
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 4px;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-wrapper textarea {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 14px;
            padding: 10px 12px;
            resize: none;
            min-height: 24px;
            max-height: 120px;
            line-height: 1.5;
        }

        .input-wrapper textarea::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border: none;
            border-radius: var(--radius-sm);
            background: var(--accent);
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            align-self: flex-end;
            font-size: 18px;
        }

        .send-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .input-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            padding: 0 4px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .input-footer kbd {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 1px 5px;
            font-size: 10px;
        }

        /* Clear button */
        .clear-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 11px;
            transition: color 0.2s;
        }

        .clear-btn:hover {
            color: var(--text-primary);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .app { padding: 0 12px; }
            .message-content.user { max-width: 90%; }
            .message-content { padding: 12px 14px; font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="app" id="app">
    <!-- Header -->
    <header class="header">
        <div class="header-logo">ES</div>
        <div class="header-text">
            <h1>ESMind</h1>
            <p>自然语言 → Elasticsearch 查询 Agent</p>
        </div>
        <div class="header-status">
            <span class="status-dot"></span>
            <span id="status-label">就绪</span>
        </div>
    </header>

    <!-- Messages -->
    <div class="messages" id="messages"></div>

    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <span class="loading-text">Agent 正在思考<span class="dots"></span></span>
    </div>

    <!-- Input -->
    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="input"
                      placeholder="例：找出诊断中含有'心肌梗死'的患者..."
                      rows="1"
                      maxlength="2000"
                      oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="发送 (Enter)">
                ▶
            </button>
        </div>
        <div class="input-footer">
            <span><kbd>Enter</kbd> 发送 · <kbd>Shift</kbd>+<kbd>Enter</kbd> 换行</span>
            <button class="clear-btn" onclick="clearMessages()">清空对话</button>
        </div>
    </div>
</div>

<script>
    // ═══════════════════════════════════════════════════════════════
    // Configure marked.js
    // ═══════════════════════════════════════════════════════════════
    marked.setOptions({
        breaks: true,
        gfm: true
    });

    // Custom renderer for copyable code blocks
    const renderer = new marked.Renderer();
    renderer.code = function({ text, lang }) {
        const langLabel = lang ? lang.toUpperCase() : 'JSON';
        const id = 'code-' + Math.random().toString(36).slice(2, 8);
        return '<div class="code-header">'
            + '<span>' + langLabel + '</span>'
            + '<button class="copy-btn" onclick="copyCode(\'' + id + '\')">📋 复制</button>'
            + '</div>'
            + '<pre><code id="' + id + '">' + escapeHtml(text) + '</code></pre>';
    };
    marked.use({ renderer });

    // Escape HTML to prevent XSS in code blocks
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Copy code block content
    function copyCode(id) {
        const el = document.getElementById(id);
        if (!el) return;
        navigator.clipboard.writeText(el.textContent).then(() => {
            const btn = el.parentElement.previousElementSibling?.querySelector('.copy-btn');
            if (btn) {
                btn.textContent = '✅ 已复制';
                setTimeout(() => { btn.textContent = '📋 复制'; }, 2000);
            }
        }).catch(() => {
            // Fallback for older browsers
            const range = document.createRange();
            range.selectNode(el);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            document.execCommand('copy');
        });
    }

    // ═══════════════════════════════════════════════════════════════
    // Chat logic
    // ═══════════════════════════════════════════════════════════════

    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const messages = document.getElementById('messages');
    const loading = document.getElementById('loading');
    const statusLabel = document.getElementById('status-label');

    let isProcessing = false;

    // Auto-resize textarea
    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    // Send message on Enter (Shift+Enter for newline)
    input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    async function sendMessage() {
        const question = input.value.trim();
        if (!question || isProcessing) return;

        // Disable input
        isProcessing = true;
        sendBtn.disabled = true;
        input.disabled = true;

        // Add user message
        addUserMessage(question);

        // Clear input
        input.value = '';
        input.style.height = 'auto';

        // Show loading
        loading.classList.add('active');
        statusLabel.textContent = '查询中...';
        scrollToBottom();

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question })
            });

            const data = await response.json();

            // Add agent response
            addAgentMessage(data.answer, data.elapsed_ms);

        } catch (err) {
            addAgentMessage('⚠️ 请求失败: ' + err.message, 0);
        } finally {
            // Re-enable input
            isProcessing = false;
            sendBtn.disabled = false;
            input.disabled = false;
            input.focus();
            loading.classList.remove('active');
            statusLabel.textContent = '就绪';
            scrollToBottom();
        }
    }

    function addUserMessage(text) {
        const now = new Date();
        const time = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

        const div = document.createElement('div');
        div.className = 'message';
        div.innerHTML = '<div class="message-header">'
            + '<div class="message-avatar user">U</div>'
            + '<span class="message-name">查询</span>'
            + '<span class="message-time">' + time + '</span>'
            + '</div>'
            + '<div class="message-content user">' + escapeHtml(text) + '</div>';
        messages.appendChild(div);
        scrollToBottom();
    }

    function addAgentMessage(text, elapsedMs) {
        const now = new Date();
        const time = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        const elapsed = elapsedMs ? formatElapsed(elapsedMs) : '';

        const div = document.createElement('div');
        div.className = 'message';
        div.innerHTML = '<div class="message-header">'
            + '<div class="message-avatar agent">AI</div>'
            + '<span class="message-name">ESMind</span>'
            + '<span class="message-time">' + elapsed + ' ' + time + '</span>'
            + '</div>'
            + '<div class="message-content agent">' + marked.parse(text) + '</div>';
        messages.appendChild(div);
        scrollToBottom();
    }

    function formatElapsed(ms) {
        if (ms < 1000) return ms + 'ms';
        if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
        const m = Math.floor(ms / 60000);
        const s = Math.floor((ms % 60000) / 1000);
        return m + 'm ' + s + 's';
    }

    function scrollToBottom() {
        setTimeout(() => {
            messages.scrollTop = messages.scrollHeight;
        }, 50);
    }

    function clearMessages() {
        if (messages.children.length === 0) return;
        if (confirm('确定清空所有对话？')) {
            messages.innerHTML = '';
            loading.classList.remove('active');
            isProcessing = false;
            sendBtn.disabled = false;
            input.disabled = false;
        }
    }

    // Focus input on load
    window.addEventListener('load', () => {
        input.focus();
    });
</script>

</body>
</html>
